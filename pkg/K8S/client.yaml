apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: test-client
spec:
  serviceName: "test-client"
  replicas: 2
  selector:
    matchLabels:
      app: test-client
  template:
    metadata:
      labels:
        app: test-client
    spec:
      containers:
        - name: client
          image: test-client:1.1
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args: ["sleep infinity"]
#         args: ["test-server-service", "9000"]
#         ports:
#           - containerPort: 9000
