# 서버 애플리케이션 로그 파일(server.log) 저장용 PVC
# 적용: kubectl apply -f pvc-log.yaml
# 스토리지 클래스가 필요하면 spec.storageClassName 주석 해제 후 이름 지정
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: log-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # storageClassName: standard
