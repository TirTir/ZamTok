apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-client
  template:
    metadata:
      labels:
        app: test-client
    spec:
      containers:
        - name: client
          image: test-client:1.0
          imagePullPolicy: Always
          command: ["./client"]
          args: ["test-server-service", "9000"]
          ports:
            - containerPort: 9000
