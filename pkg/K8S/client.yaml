apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: test-client
spec:
  serviceName: "test-client"
  replicas: 2
  selector:
    matchLabels:
      app: test-client
  template:
    metadata:
      labels:
        app: test-client
    spec:
      containers:
        - name: client
          image: tirtir0827/zamtok-client:latest
          imagePullPolicy: Always
#         imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args: ["sleep infinity"]
---
apiVersion: v1
kind: Service
metadata:
  name: test-client
spec:
  clusterIP: None
  selector:
    app: test-client
