# log-pvc 먼저 적용 권장: kubectl apply -f pvc-log.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-server
  template:
    metadata:
      labels:
        app: test-server
    spec:
      containers:
        - name: server
          image: test-server:1.2
          imagePullPolicy: IfNotPresent
          command: ["sh", "/scripts/setup.sh"]
          envFrom:
            - configMapRef:
                name: server-config
          ports:
            - containerPort: 9000
          resources:
            limits:
              memory: 1Gi
              ephemeral-storage: 2Gi
          volumeMounts:
            - name: user-info
              mountPath: /storage/user
            - name: local-log
              mountPath: /storage/local-log
            - name: script-vol
              mountPath: /scripts
      volumes:
        - name: user-info
          emptyDir: {}
        - name: local-log
          persistentVolumeClaim:
            claimName: log-pvc
        - name: script-vol
          configMap:
            name: zamtok-script-volume
            defaultMode: 0755       # 실행 권한 부여
---
apiVersion: v1
kind: Service
metadata:
  name: test-server-service
spec:
  selector:
    app: test-server
  ports:
    - port: 9000
      targetPort: 9000
  type: ClusterIP
